<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let num1=100;
        let username = 'Priya';
        document.write(typeof(username)+"<br>")
        document.write(typeof(num1)+"<br>")
        document.write(typeof(true)+"<br>")

        // convert number to string
        let str = String(num1)
        document.write(typeof(str)+"<br>")
        document.write((str+str)+"<br>")
        // convert boolean to String
        let strbool = String(true);
        document.write(typeof(strbool)+"<br>")
        document.write(`${strbool}friend`+"<br>")

        // convert String into number
        let strval ="900";
        let num2 = Number(strval);
        document.write(typeof(num2)+"<br>")

        let num3 = parseInt(strval)
        document.write(typeof(num3)+"<br>")

        // let strname ="Priya";
        // let num4 = parseInt(strname);
        // document.write(num4);

        document.write(Boolean(0)+"<br>")//false
        document.write(Boolean(null)+"<br>")//false
        document.write(Boolean(undefined)+"<br>")//false
        document.write(Boolean("")+"<br>")//false
        document.write(Boolean(1)+"<br>")//true
        document.write(Boolean(" ")+"<br>")//true
        document.write(Boolean("0")+"<br>")//true
        document.write(Boolean("true")+"<br>")//true



        
        
    </script>
</head>
<body>
    
</body>
</html>
