<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let num1 = parseInt(prompt("Enter Number"));
      let num2 = parseInt(prompt("Enter Number"));
      
    let choice = parseInt(prompt("Enter choice"));
  
        switch (choice) {
          case 1:
            document.write(`Sum ${num1 + num2}`);
            break;
          case 2:
            document.write(`Product ${num1 * num2}`);
            break;
          case 3:
            document.write(`Diff ${num1 - num2}`);
            break;
          default:
            document.write(`Invalid`);
        
        }
      
    </script>
  </head>
  <body></body>
</html>
