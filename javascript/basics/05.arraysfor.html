<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

</head>

<body>
  <script>
    let nums = [10, 20, 30, 40, 50]
    for (let i = 0; i < nums.length; i++)
      document.write(`num: ${nums[i] * 2}<br/>`)

    document.write('<br/>')
    //similar to foreach in java
    // one by one num comes in
    for (let num of nums)
      document.write(`num: ${num}<br/>`)

    document.write('<br/>')

    for (let i in nums)
      document.write(`num: ${nums[i] * 3}<br/>`)

     document.write('<br/>')



  </script>
</body>

</html>
