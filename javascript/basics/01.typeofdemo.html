<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let num = 100;
        document.write(typeof(num)+"<br>")
        num = 'Hundred'
        document.write(typeof(num)+"<br>")
        let val=parseInt('Priya')
        document.write(typeof(val)+" "+val+"<br>")
        document.write(false==0) // true checks only value
        document.write(false===0) //false checks both datatype and value

    </script>
</head>
